<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Pronunciation Challenge</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>🎮 English Pronunciation Challenge</h1>

<div id="studentSection">
    <input id="name" placeholder="Student Name">
    <input id="course" placeholder="Course (6A, 7B, 10A...)">

    <button onclick="startGame()" id="startBtn">
        🚀 Start Adventure
    </button>
</div>

<div id="gameArea" style="display:none;">
    <h2>Select Unit</h2>
    <select id="unitSelector" onchange="loadUnit()">
    </select>
    <div id="unitTitle"></div>

    <div class="stats">

        <div>
            🏅 Level:
            <span id="level">1</span>
        </div>

        <div>
            ⭐ XP:
            <span id="xp">0</span>
        </div>

        <div>
            🔥 Streak:
            <span id="streak">0</span>
        </div>

    </div>

    <h3>
        Question
        <span id="questionNumber">1</span>
        /
        <span id="totalQuestions">10</span>
    </h3>

    <div class="progress-container">
        <div id="progressBar"></div>
    </div>

    <div id="badgeArea">
        🥉 Beginner Speaker
    </div>

    <h2 id="question"></h2>

    <button onclick="listenPhrase()">
        🔊 Listen
    </button>

    <button onclick="speak()">
        🎤 Speak
    </button>

    <button onclick="nextQuestion()">
        ➡ Next
    </button>

    <div id="feedback"></div>

</div>

</div>
<script src="data/grade6.js"></script>
<script src="data/grade7.js"></script>
<script src="data/grade8.js"></script>
<script src="data/grade9.js"></script>
<script src="data/grade10.js"></script>
<script src="data/grade11.js"></script>
    
<script src="script.js"></script>

</body>
</html>
